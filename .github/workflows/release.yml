name: Release

# Builds the standalone binaries for each platform and attaches them to a
# GitHub Release when a "v*" tag is pushed.
#
#   git tag v1.0.0 && git push origin v1.0.0
#
# Each binary is built natively on a runner of the target platform: the Node SEA
# blob must be generated by a Node that can run on the build host.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {} # manual build (without publishing a release)

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14, os: darwin, arch: arm64 }
          - { runner: macos-13, os: darwin, arch: x64 }
          - { runner: ubuntu-latest, os: linux, arch: x64 }
          - { runner: ubuntu-24.04-arm, os: linux, arch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build binary
        env:
          TARGET_OS: ${{ matrix.os }}
          TARGET_ARCH: ${{ matrix.arch }}
        run: pnpm build:binary

      - name: Rename artifact
        run: |
          mv dist/rocket2matter \
             dist/rocket2matter-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocket2matter-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/rocket2matter-${{ matrix.os }}-${{ matrix.arch }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rocket2matter-${{ matrix.os }}-${{ matrix.arch }}
